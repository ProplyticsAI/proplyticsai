<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <!-- Background (optional, remove for transparent) -->
  <rect width="240" height="240" fill="#F5F0E8" rx="16"/>

  <!-- House body -->
  <path d="M60 100 L60 180 L180 180 L180 100 L120 50 Z"
        fill="#FDFBF7"
        stroke="#2D5A3D"
        stroke-width="4"
        stroke-linejoin="round"/>

  <!-- Roof -->
  <path d="M50 105 L120 40 L190 105"
        stroke="#2D5A3D"
        stroke-width="4"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Analysis bars inside house (growth trend) -->
  <rect x="75" y="155" width="18" height="20" rx="2" fill="#E5E0D5"/>
  <rect x="102" y="140" width="18" height="35" rx="2" fill="#2C4A6E"/>
  <rect x="129" y="120" width="18" height="55" rx="2" fill="#2D5A3D"/>

  <!-- Trend line (upward arrow) -->
  <path d="M68 165 L108 135 L145 110 L175 80"
        stroke="#2D5A3D"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
        stroke-dasharray="0"/>

  <!-- Arrow head -->
  <path d="M168 86 L175 80 L167 75"
        stroke="#2D5A3D"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>
</svg>
