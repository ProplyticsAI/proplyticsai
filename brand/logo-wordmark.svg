<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" fill="none">
  <!-- Logo Mark + Wordmark Combo -->

  <!-- Icon -->
  <g transform="translate(8, 8)">
    <!-- House body -->
    <path d="M4 14 L4 44 L44 44 L44 14 L24 0 Z"
          fill="#FDFBF7"
          stroke="#2D5A3D"
          stroke-width="2"
          stroke-linejoin="round"/>

    <!-- Roof -->
    <path d="M0 15 L24 2 L48 15"
          stroke="#2D5A3D"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"/>

    <!-- Trend bars -->
    <rect x="10" y="34" width="6" height="8" rx="1" fill="#E5E0D5"/>
    <rect x="19" y="29" width="6" height="13" rx="1" fill="#2C4A6E"/>
    <rect x="28" y="23" width="6" height="19" rx="1" fill="#2D5A3D"/>
  </g>

  <!-- Wordmark -->
  <text x="68" y="38"
        font-family="Outfit, system-ui, sans-serif"
        font-weight="600"
        font-size="22"
        fill="#1C1C1C"
        letter-spacing="-0.02em">
    Property
  </text>
  <text x="68" y="58"
        font-family="Outfit, system-ui, sans-serif"
        font-weight="300"
        font-size="14"
        fill="#7A7A7A"
        letter-spacing="0.05em">
    ANALYTIC
  </text>

  <!-- Tagline -->
  <text x="68" y="74"
        font-family="Outfit, system-ui, sans-serif"
        font-weight="400"
        font-size="9"
        fill="#A8A8A8"
        letter-spacing="0">
    Immobilienpotenzial analysieren
  </text>
</svg>
