# Netlify-Konfiguration für proplytic.ai (Next.js)
#
# Das @netlify/next-Runtime wird automatisch erkannt und installiert. Es wandelt
# Next.js-API-Routen (pages/api/*) in Netlify Functions um. Dateien in public/
# (inkl. der statischen HTML-Layouts unter public/layouts/) werden weiterhin am
# Root ausgeliefert. So funktionieren sowohl die Layouts als auch /api/bewertungen.

[build]
  command = "next build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "18"

# Die alten Marketing-/App-Seiten (pages/index.jsx, login.jsx, register.jsx,
# dashboard.jsx, valuations.jsx, comparison.jsx, analyse.jsx) wurden entfernt.
# Die "echten" URLs leiten auf die vollständige, neue Plattform unter
# /layouts/*.html weiter (Theme-Overhaul + Backend-Anbindung aus PRs #11-17).
[[redirects]]
  from = "/"
  to = "/layouts/landing.html"
  status = 301

[[redirects]]
  from = "/login"
  to = "/layouts/login.html"
  status = 301

[[redirects]]
  from = "/register"
  to = "/layouts/registrieren.html"
  status = 301

[[redirects]]
  from = "/dashboard"
  to = "/layouts/dashboard.html"
  status = 301

[[redirects]]
  from = "/valuations"
  to = "/layouts/verlauf.html"
  status = 301

[[redirects]]
  from = "/comparison"
  to = "/layouts/vergleich.html"
  status = 301

[[redirects]]
  from = "/analyse"
  to = "/layouts/bewertung.html"
  status = 301
