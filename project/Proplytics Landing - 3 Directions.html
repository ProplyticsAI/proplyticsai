<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Proplytics — Landing Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..600;1,6..96,400..600&family=Hanken+Grotesk:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=Schibsted+Grotesk:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #ECEAE4; }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="landing-shared.jsx"></script>
<script type="text/babel" src="direction-kontor.jsx"></script>
<script type="text/babel" src="direction-atlas.jsx"></script>
<script type="text/babel" src="direction-journal.jsx"></script>
<script type="text/babel">
  function App() {
    const [h, setH] = React.useState({ kontor: 4800, atlas: 4800, journal: 4800 });
    React.useEffect(() => {
      const measure = () => {
        const m = {};
        ['kontor', 'atlas', 'journal'].forEach((k) => {
          const el = document.getElementById('measure-' + k);
          if (el) m[k] = el.offsetHeight; // offsetHeight is unaffected by the canvas's transform:scale()
        });
        if (Object.keys(m).length) setH((p) => ({ ...p, ...m }));
      };
      const run = () => { measure(); setTimeout(measure, 400); };
      if (document.fonts && document.fonts.ready) document.fonts.ready.then(run);
      else setTimeout(run, 600);
    }, []);

    return (
      <DesignCanvas>
        <DCSection id="dirs" title="Proplytics — Landingpage" subtitle="Drei Richtungen · Royal Blue + neue Typografie · Light Mode">
          <DCArtboard id="kontor" label="A · Kontor — Didone Luxe (Bodoni Moda)" width={1440} height={h.kontor}>
            <div id="measure-kontor"><DirectionKontor /></div>
          </DCArtboard>
          <DCArtboard id="atlas" label="B · Atlas — Grotesk / Fintech (Space Grotesk)" width={1440} height={h.atlas}>
            <div id="measure-atlas"><DirectionAtlas /></div>
          </DCArtboard>
          <DCArtboard id="journal" label="C · Journal — Editorial Serif (Newsreader)" width={1440} height={h.journal}>
            <div id="measure-journal"><DirectionJournal /></div>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
