<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>proplytic.ai — Datahaus Logo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #FBF9F6; }
  * { box-sizing: border-box; }
  body { font-family: 'Geist', system-ui, sans-serif; color: #213A5A; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="logo5.jsx"></script>
<script type="text/babel">
  const PAPER='#FBF9F6', INK='#213A5A', SAGE='#6F7F59';
  const LINE='#E7E1D6';
  const muted='#8B8576';
  const monoF="'Geist Mono', ui-monospace, monospace";

  const Lbl=({children,color=muted,style})=>(
    <span style={{fontFamily:monoF,fontSize:11,fontWeight:500,letterSpacing:'.16em',
      textTransform:'uppercase',color,...style}}>{children}</span>
  );

  function Panel({title,children,bg='#fff',pad=28,h}){
    return (
      <div style={{background:bg,border:`1px solid ${LINE}`,borderRadius:16,padding:pad,
        display:'flex',flexDirection:'column',minHeight:h}}>
        <Lbl style={{marginBottom:20}}>{title}</Lbl>
        <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center'}}>{children}</div>
      </div>
    );
  }

  function Swatch({c,name,hex,dark}){
    return (
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        <div style={{height:64,borderRadius:10,background:c,border:`1px solid ${LINE}`}} />
        <div style={{fontSize:12.5,fontWeight:600,color:INK}}>{name}</div>
        <div style={{fontFamily:monoF,fontSize:11,color:muted}}>{hex}</div>
      </div>
    );
  }

  function App(){
    return (
      <div style={{maxWidth:1100,margin:'0 auto',padding:'62px 44px 110px'}}>
        <Lbl color={SAGE}>proplytic.ai · Markenzeichen</Lbl>
        <h1 style={{fontWeight:600,fontSize:46,letterSpacing:'-0.02em',margin:'12px 0 14px',
          maxWidth:780,lineHeight:1.06,color:INK}}>
          Datacore — Immobilie auf der Datenplatine.
        </h1>
        <p style={{fontSize:16.5,lineHeight:1.6,color:muted,maxWidth:660,margin:0}}>
          Das isometrische Gebäude in deiner Palette — weiße Daten-Slabs, Marine-Glas mit Server-Raster,
          salbeigrüne Lamellen-Säulen — steht jetzt auf einer Platine: Gold-Leiterbahnen, Chips und ein
          leuchtender Prozessor, der per Datenbahn mit dem Haus verbunden ist. Datacenter-Aussage, ruhig und matt.
        </p>

        {/* HERO — Datacore lockup */}
        <div style={{marginTop:42,border:`1px solid ${LINE}`,borderRadius:20,background:'#FCFBF8',
          padding:'40px 0 44px',display:'flex',flexDirection:'column',alignItems:'center'}}>
          <MarkDatacore size={360} />
          <Wordmark5 fs={64} />
          <div style={{display:'flex',alignItems:'center',gap:10,width:360,marginTop:12}}>
            <span style={{flex:1,height:1.5,background:SAGE,opacity:0.55}} />
            <span style={{display:'inline-flex',alignItems:'flex-end',gap:2,height:14}}>
              <span style={{width:4,height:6,background:'#7E8A6F'}} />
              <span style={{width:4,height:10,background:INK}} />
              <span style={{width:4,height:14,background:INK}} />
            </span>
            <span style={{flex:1,height:1.5,background:INK,opacity:0.55}} />
          </div>
          <div style={{fontSize:11,fontWeight:500,letterSpacing:'.2em',color:INK,marginTop:8}}>
            IMMOBILIEN BEWERTEN. BESSER ENTSCHEIDEN.
          </div>
        </div>

        {/* GRID */}
        <div style={{display:'grid',gridTemplateColumns:'1.2fr 1fr',gap:20,marginTop:20}}>
          <Panel title="Horizontale Wortmarke">
            <div style={{display:'flex',alignItems:'center',gap:14}}>
              <MarkDatacore size={104} />
              <Wordmark5 fs={42} />
            </div>
          </Panel>
          <Panel title="Ohne Platine · nur Gebäude">
            <div style={{display:'flex',gap:18,alignItems:'center'}}>
              <div style={{background:'#fff',border:`1px solid ${LINE}`,borderRadius:20,padding:8,boxShadow:'0 16px 40px -28px rgba(0,0,0,.4)'}}>
                <MarkDatahaus size={92} />
              </div>
              <div style={{background:INK,borderRadius:18,padding:8}}>
                <MarkDatahaus size={64} />
              </div>
            </div>
          </Panel>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20,marginTop:20}}>
          <Panel title="Maßstab">
            <div style={{display:'flex',alignItems:'flex-end',gap:24}}>
              <MarkDatacore size={104} /><MarkDatahaus size={56} /><MarkDatahaus size={34} />
            </div>
          </Panel>
          <Panel title="Palette">
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,width:'100%'}}>
              <Swatch c="#FBF9F6" name="Papier" hex="#FBF9F6" />
              <Swatch c="#D7CBB6" name="Creme" hex="#D7CBB6" />
              <Swatch c="#7E8A6F" name="Salbei" hex="#7E8A6F" />
              <Swatch c="#3F5867" name="Glas" hex="#3F5867" />
            </div>
          </Panel>
        </div>

        <p style={{fontSize:13.5,lineHeight:1.6,color:muted,maxWidth:740,marginTop:24}}>
          Zwei Versionen einer Marke: <strong style={{color:INK}}>Datacore</strong> (mit Platine) als
          ausdrucksstarkes Hauptlogo, <strong style={{color:INK}}>Datahaus</strong> (nur Gebäude) für kleine
          Größen und Favicon. Sag mir, ob die Richtung passt — dann verfeinere ich Details und setze es in die Landingpage ein.
        </p>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
