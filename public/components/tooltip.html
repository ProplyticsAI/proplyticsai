<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tooltip — Proplytic.ai Design System</title>
  <link rel="stylesheet" href="../tokens/tokens.css">
  <link rel="stylesheet" href="./button.css">
  <link rel="stylesheet" href="./tooltip.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--color-background); color: var(--color-foreground); font-family: var(--font-sans); padding: var(--space-16) var(--space-10); }
    .page-title { font-family: var(--font-serif); font-size: var(--text-4xl); font-weight: var(--font-normal); letter-spacing: var(--tracking-tight); margin-bottom: var(--space-2); }
    .page-subtitle { color: var(--color-muted); font-size: var(--text-sm); margin-bottom: var(--space-16); }
    .section { margin-bottom: var(--space-16); }
    .section-label { font-size: var(--text-xs); font-weight: var(--font-semibold); letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--color-muted); margin-bottom: var(--space-5); padding-bottom: var(--space-2); border-bottom: 1px solid var(--color-border); }
    .demo-area { display: flex; align-items: center; justify-content: center; gap: var(--space-10); padding: var(--space-16) var(--space-8); }
    .info-icon { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--color-muted); color: var(--color-muted); font-size: 11px; font-weight: 600; cursor: default; }
  </style>
</head>
<body>

  <h1 class="page-title">Tooltip</h1>
  <p class="page-subtitle">Komponente · components/tooltip.css · data-tooltip Attribut</p>

  <section class="section">
    <p class="section-label">Positionen — Hover zum Anzeigen</p>
    <div class="demo-area">
      <button class="btn btn-outline" data-tooltip="Erklärungstext oben" data-tooltip-pos="top">
        Oben (Standard)
      </button>
      <button class="btn btn-outline" data-tooltip="Erklärungstext unten" data-tooltip-pos="bottom">
        Unten
      </button>
      <button class="btn btn-outline" data-tooltip="Links" data-tooltip-pos="left">
        Links
      </button>
      <button class="btn btn-outline" data-tooltip="Rechts" data-tooltip-pos="right">
        Rechts
      </button>
    </div>
  </section>

  <section class="section">
    <p class="section-label">Im Kontext — Info-Icons und Labels</p>
    <div style="display: flex; flex-direction: column; gap: var(--space-6); max-width: 480px;">

      <div style="display: flex; align-items: center; justify-content: space-between; padding: var(--space-4); background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md);">
        <span style="font-size: var(--text-sm);">Nettomietrendite</span>
        <div style="display: flex; align-items: center; gap: var(--space-2);">
          <span style="font-family: var(--font-mono); font-size: var(--text-sm); font-weight: 500;">4,1 %</span>
          <span class="info-icon" data-tooltip="Jahresnettomiete geteilt durch den Kaufpreis, ohne Erwerbsnebenkosten" data-tooltip-pos="top" tabindex="0">i</span>
        </div>
      </div>

      <div style="display: flex; align-items: center; justify-content: space-between; padding: var(--space-4); background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md);">
        <span style="font-size: var(--text-sm);">Vervielfältiger</span>
        <div style="display: flex; align-items: center; gap: var(--space-2);">
          <span style="font-family: var(--font-mono); font-size: var(--text-sm); font-weight: 500;">24,4×</span>
          <span class="info-icon" data-tooltip="Kaufpreis geteilt durch die Jahresnettomiete — gibt an, nach wie vielen Jahren der Kaufpreis durch Mieteinnahmen gedeckt ist" data-tooltip-pos="top" tabindex="0">i</span>
        </div>
      </div>

      <div style="display: flex; align-items: center; justify-content: space-between; padding: var(--space-4); background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md);">
        <span style="font-size: var(--text-sm);">KI-Score</span>
        <div style="display: flex; align-items: center; gap: var(--space-2);">
          <span style="font-family: var(--font-mono); font-size: var(--text-sm); font-weight: 500; color: var(--color-primary);">82 / 100</span>
          <span class="info-icon" data-tooltip="Composite-Score aus Lage, Rendite, Substanz, Mietstruktur und Marktlage — berechnet durch das Proplytic KI-Modell" data-tooltip-pos="top" tabindex="0">i</span>
        </div>
      </div>

    </div>
  </section>

  <section class="section">
    <p class="section-label">Auf Buttons — Deaktivierte Aktionen</p>
    <div style="display: flex; gap: var(--space-4);">
      <span data-tooltip="Zum Teilen benötigen Sie mindestens Pro-Plan" data-tooltip-pos="top" style="display: inline-flex;">
        <button class="btn btn-outline" disabled style="pointer-events: none;">Teilen</button>
      </span>
      <span data-tooltip="Exportfunktion ist noch in Entwicklung" data-tooltip-pos="top" style="display: inline-flex;">
        <button class="btn btn-outline" disabled style="pointer-events: none;">API-Export</button>
      </span>
    </div>
  </section>

</body>
</html>
