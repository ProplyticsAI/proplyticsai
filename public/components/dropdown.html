<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dropdown — Proplytic.ai Design System</title>
  <link rel="stylesheet" href="../tokens/tokens.css">
  <link rel="stylesheet" href="./button.css">
  <link rel="stylesheet" href="./dropdown.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--color-background);
      color: var(--color-foreground);
      font-family: var(--font-sans);
      font-size: var(--text-base);
      padding: var(--space-16) var(--space-10);
    }
    .page-title {
      font-family: var(--font-serif);
      font-size: var(--text-4xl);
      font-weight: var(--font-normal);
      letter-spacing: var(--tracking-tight);
      margin-bottom: var(--space-2);
    }
    .page-subtitle { color: var(--color-muted); font-size: var(--text-sm); margin-bottom: var(--space-12); }
    .section { margin-bottom: var(--space-12); }
    .section-label {
      font-size: var(--text-xs); font-weight: var(--font-semibold);
      letter-spacing: var(--tracking-wider); text-transform: uppercase;
      color: var(--color-muted); margin-bottom: var(--space-4);
      padding-bottom: var(--space-2); border-bottom: 1px solid var(--color-border);
    }
    .row { display: flex; flex-wrap: wrap; gap: var(--space-6); align-items: flex-start; }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.dropdown').forEach(dropdown => {
        const trigger = dropdown.querySelector('[data-dropdown-trigger]');
        if (!trigger) return;
        trigger.addEventListener('click', e => {
          e.stopPropagation();
          const isOpen = dropdown.classList.contains('is-open');
          document.querySelectorAll('.dropdown.is-open').forEach(d => d.classList.remove('is-open'));
          if (!isOpen) dropdown.classList.add('is-open');
        });
      });
      document.addEventListener('click', () => {
        document.querySelectorAll('.dropdown.is-open').forEach(d => d.classList.remove('is-open'));
      });
    });
  </script>
</head>
<body>

  <h1 class="page-title">Dropdown</h1>
  <p class="page-subtitle">Komponente · components/dropdown.css</p>

  <!-- Aktionen-Dropdown -->
  <section class="section">
    <p class="section-label">Varianten</p>
    <div class="row">

      <!-- Basis -->
      <div class="dropdown">
        <button class="btn btn-outline" data-dropdown-trigger>
          Aktionen
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="dropdown-menu">
          <a class="dropdown-item" href="#">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M2 12L5.5 7.5l3 3L12 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="13.5" cy="3.5" r="1.5" stroke="currentColor" stroke-width="1.2"/>
            </svg>
            Analyse starten
          </a>
          <a class="dropdown-item" href="#">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M2.5 8a5.5 5.5 0 1 1 11 0 5.5 5.5 0 0 1-11 0Z" stroke="currentColor" stroke-width="1.4"/>
              <path d="M8 5.5v3L10 10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Verlauf anzeigen
          </a>
          <a class="dropdown-item" href="#">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M11 4H3a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V7l-3-3Z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M11 4v3h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Exportieren
            <span class="dropdown-shortcut">⌘E</span>
          </a>
          <div class="dropdown-separator"></div>
          <a class="dropdown-item" href="#">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M11.5 3.5l1 1-8 8-1.5.5.5-1.5 8-8Z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Bearbeiten
          </a>
          <div class="dropdown-separator"></div>
          <button class="dropdown-item dropdown-item-danger">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M2.5 4h11M6 4V2.5h4V4M13 4l-.75 9.5H3.75L3 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M6.5 7v4M9.5 7v4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            Löschen
            <span class="dropdown-shortcut">⌫</span>
          </button>
        </div>
      </div>

      <!-- Mit Gruppen-Labels -->
      <div class="dropdown">
        <button class="btn btn-outline" data-dropdown-trigger>
          Ansicht
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="dropdown-menu">
          <p class="dropdown-label">Sortieren nach</p>
          <button class="dropdown-item" aria-checked="true">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <rect x="1.5" y="8.5" width="2.5" height="6" rx="0.5" stroke="currentColor" stroke-width="1.3"/>
              <rect x="6" y="5" width="2.5" height="9.5" rx="0.5" stroke="currentColor" stroke-width="1.3"/>
              <rect x="10.5" y="2" width="2.5" height="12.5" rx="0.5" stroke="currentColor" stroke-width="1.3"/>
            </svg>
            Rendite
            <svg class="dropdown-check" width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M3 8l3.5 3.5L13 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="dropdown-item" aria-checked="false">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M8 14C8 14 3 10 3 6.5a5 5 0 0 1 10 0C13 10 8 14 8 14Z" stroke="currentColor" stroke-width="1.3"/>
              <circle cx="8" cy="6.5" r="1.5" stroke="currentColor" stroke-width="1.2"/>
            </svg>
            Standort
            <svg class="dropdown-check" width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M3 8l3.5 3.5L13 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="dropdown-item" aria-checked="false">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <rect x="1.5" y="1.5" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.3"/>
              <path d="M5 8h6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            Kaufpreis
            <svg class="dropdown-check" width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M3 8l3.5 3.5L13 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="dropdown-separator"></div>
          <p class="dropdown-label">Darstellung</p>
          <button class="dropdown-item active">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <rect x="1.5" y="1.5" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.3"/>
              <rect x="9" y="1.5" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.3"/>
              <rect x="1.5" y="9" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.3"/>
              <rect x="9" y="9" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.3"/>
            </svg>
            Karten
          </button>
          <button class="dropdown-item">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M2 4.5h12M2 8h12M2 11.5h12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
            Liste
          </button>
        </div>
      </div>

      <!-- Rechts ausgerichtet, Mehr-Button -->
      <div class="dropdown">
        <button class="btn btn-icon btn-outline" data-dropdown-trigger aria-label="Mehr Optionen">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="3.5" r="1.25" fill="currentColor"/>
            <circle cx="8" cy="8" r="1.25" fill="currentColor"/>
            <circle cx="8" cy="12.5" r="1.25" fill="currentColor"/>
          </svg>
        </button>
        <div class="dropdown-menu align-right">
          <a class="dropdown-item" href="#">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M11.5 3.5l1 1-8 8-1.5.5.5-1.5 8-8Z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Umbenennen
          </a>
          <a class="dropdown-item" href="#">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M13 4.5a5.5 5.5 0 0 1-5.5 5.5 5.5 5.5 0 0 1 0-11A5.5 5.5 0 0 1 13 4.5Z" stroke="currentColor" stroke-width="1.3"/>
              <path d="M8.5 7V3M10.5 5H6.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              <path d="M9.5 9.5L13 13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
            Kopie erstellen
          </a>
          <a class="dropdown-item" href="#">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M10 2H6a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h4m0-12h2a1 1 0 0 1 1 1v3m-3-4v4m3 0v6m0 0-2-2m2 2 2-2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Als Bericht speichern
          </a>
          <div class="dropdown-separator"></div>
          <button class="dropdown-item" disabled>
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M8 2a6 6 0 1 1 0 12A6 6 0 0 1 8 2Z" stroke="currentColor" stroke-width="1.3"/>
              <path d="M8 6v4M8 11.5v.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
            Teilen (bald verfügbar)
          </button>
          <div class="dropdown-separator"></div>
          <button class="dropdown-item dropdown-item-danger">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M2.5 4h11M6 4V2.5h4V4M13 4l-.75 9.5H3.75L3 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M6.5 7v4M9.5 7v4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            Löschen
          </button>
        </div>
      </div>

    </div>
  </section>

</body>
</html>
