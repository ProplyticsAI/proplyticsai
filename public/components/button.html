<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button — Proplytic.ai Design System</title>
  <link rel="stylesheet" href="../tokens/tokens.css">
  <link rel="stylesheet" href="./button.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--color-background);
      color: var(--color-foreground);
      font-family: var(--font-sans);
      font-size: var(--text-base);
      line-height: var(--leading-normal);
      padding: var(--space-16) var(--space-10);
    }

    .page-title {
      font-family: var(--font-serif);
      font-size: var(--text-4xl);
      font-weight: var(--font-normal);
      letter-spacing: var(--tracking-tight);
      margin-bottom: var(--space-2);
    }

    .page-subtitle {
      color: var(--color-muted);
      font-size: var(--text-sm);
      margin-bottom: var(--space-16);
    }

    .section {
      margin-bottom: var(--space-12);
    }

    .section-label {
      font-size: var(--text-xs);
      font-weight: var(--font-semibold);
      letter-spacing: var(--tracking-wider);
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: var(--space-4);
      padding-bottom: var(--space-2);
      border-bottom: 1px solid var(--color-border);
    }

    .row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: var(--space-3);
    }

    .dark-surface {
      background-color: var(--color-foreground);
      padding: var(--space-6);
      border-radius: var(--radius-lg);
    }
  </style>
</head>
<body>

  <h1 class="page-title">Button</h1>
  <p class="page-subtitle">Komponente · components/button.css</p>

  <!-- Varianten -->
  <section class="section">
    <p class="section-label">Varianten</p>
    <div class="row">
      <button class="btn btn-primary">Analyse starten</button>
      <button class="btn btn-secondary">Mehr erfahren</button>
      <button class="btn btn-outline">Abbrechen</button>
      <button class="btn btn-ghost">Zurück</button>
    </div>
  </section>

  <!-- Größen -->
  <section class="section">
    <p class="section-label">Größen</p>
    <div class="row">
      <button class="btn btn-primary btn-sm">Klein</button>
      <button class="btn btn-primary">Standard</button>
      <button class="btn btn-primary btn-lg">Groß</button>
    </div>
  </section>

  <!-- Disabled -->
  <section class="section">
    <p class="section-label">Disabled</p>
    <div class="row">
      <button class="btn btn-primary" disabled>Analyse starten</button>
      <button class="btn btn-secondary" disabled>Mehr erfahren</button>
      <button class="btn btn-outline" disabled>Abbrechen</button>
      <button class="btn btn-ghost" disabled>Zurück</button>
    </div>
  </section>

  <!-- Icon + Label -->
  <section class="section">
    <p class="section-label">Mit Icon</p>
    <div class="row">
      <button class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M11 11l2.5 2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Objekt suchen
      </button>
      <button class="btn btn-outline">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Hinzufügen
      </button>
      <button class="btn btn-ghost btn-icon" aria-label="Einstellungen">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M8 1.5v1.75M8 12.75v1.75M1.5 8h1.75M12.75 8H14.5M3.4 3.4l1.24 1.24M11.36 11.36l1.24 1.24M12.6 3.4l-1.24 1.24M4.64 11.36l-1.24 1.24" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </section>

  <!-- Auf dunklem Hintergrund -->
  <section class="section">
    <p class="section-label">Auf dunklem Hintergrund</p>
    <div class="dark-surface">
      <div class="row">
        <button class="btn btn-primary">Analyse starten</button>
        <button class="btn btn-ghost" style="color: #fff; --color-primary-muted: rgba(255,255,255,0.1);">Abbrechen</button>
      </div>
    </div>
  </section>

</body>
</html>
