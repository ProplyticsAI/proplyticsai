<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skeleton — Proplytic.ai Design System</title>
  <link rel="stylesheet" href="../tokens/tokens.css">
  <link rel="stylesheet" href="./skeleton.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--color-background);
      color: var(--color-foreground);
      font-family: var(--font-sans);
      font-size: var(--text-base);
      padding: var(--space-16) var(--space-10);
    }
    .page-title {
      font-family: var(--font-serif); font-size: var(--text-4xl);
      font-weight: var(--font-normal); letter-spacing: var(--tracking-tight);
      margin-bottom: var(--space-2);
    }
    .page-subtitle { color: var(--color-muted); font-size: var(--text-sm); margin-bottom: var(--space-16); }
    .section { margin-bottom: var(--space-16); }
    .section-label {
      font-size: var(--text-xs); font-weight: var(--font-semibold);
      letter-spacing: var(--tracking-wider); text-transform: uppercase;
      color: var(--color-muted); margin-bottom: var(--space-5);
      padding-bottom: var(--space-2); border-bottom: 1px solid var(--color-border);
    }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-4); }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-6); }
  </style>
</head>
<body>

  <h1 class="page-title">Skeleton</h1>
  <p class="page-subtitle">Komponente · components/skeleton.css</p>

  <!-- Stat Cards -->
  <section class="section">
    <p class="section-label">Stat Cards (Ladezustand)</p>
    <div class="grid-4">

      <div class="skeleton-stat">
        <span class="skeleton skeleton-text-sm" style="width: 60%;"></span>
        <span class="skeleton skeleton-heading-lg" style="width: 75%;"></span>
        <span class="skeleton skeleton-text-sm" style="width: 50%;"></span>
      </div>
      <div class="skeleton-stat">
        <span class="skeleton skeleton-text-sm" style="width: 55%;"></span>
        <span class="skeleton skeleton-heading-lg" style="width: 60%;"></span>
        <span class="skeleton skeleton-text-sm" style="width: 45%;"></span>
      </div>
      <div class="skeleton-stat">
        <span class="skeleton skeleton-text-sm" style="width: 70%;"></span>
        <span class="skeleton skeleton-heading-lg" style="width: 40%;"></span>
        <span class="skeleton skeleton-text-sm" style="width: 55%;"></span>
      </div>
      <div class="skeleton-stat">
        <span class="skeleton skeleton-text-sm" style="width: 65%;"></span>
        <span class="skeleton skeleton-heading-lg" style="width: 80%;"></span>
        <span class="skeleton skeleton-text-sm" style="width: 50%;"></span>
      </div>

    </div>
  </section>

  <!-- Cards -->
  <section class="section">
    <p class="section-label">Objekt-Cards (Ladezustand)</p>
    <div class="grid-2">

      <div class="skeleton-card">
        <div class="skeleton-card-header">
          <span class="skeleton skeleton-text-sm" style="width: 40%;"></span>
          <span class="skeleton skeleton-heading" style="width: 75%;"></span>
          <span class="skeleton skeleton-text" style="width: 55%;"></span>
        </div>
        <div class="skeleton-card-body">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <span class="skeleton skeleton-text" style="width: 35%;"></span>
            <span class="skeleton skeleton-text" style="width: 25%;"></span>
          </div>
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <span class="skeleton skeleton-text" style="width: 40%;"></span>
            <span class="skeleton skeleton-text" style="width: 20%;"></span>
          </div>
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <span class="skeleton skeleton-text" style="width: 30%;"></span>
            <span class="skeleton skeleton-text" style="width: 28%;"></span>
          </div>
        </div>
      </div>

      <div class="skeleton-card">
        <div class="skeleton-card-header">
          <span class="skeleton skeleton-text-sm" style="width: 35%;"></span>
          <span class="skeleton skeleton-heading" style="width: 80%;"></span>
          <span class="skeleton skeleton-text" style="width: 50%;"></span>
        </div>
        <div class="skeleton-card-body">
          <div style="display: flex; justify-content: space-between;">
            <span class="skeleton skeleton-text" style="width: 40%;"></span>
            <span class="skeleton skeleton-text" style="width: 22%;"></span>
          </div>
          <div style="display: flex; justify-content: space-between;">
            <span class="skeleton skeleton-text" style="width: 32%;"></span>
            <span class="skeleton skeleton-text" style="width: 18%;"></span>
          </div>
          <div style="display: flex; justify-content: space-between;">
            <span class="skeleton skeleton-text" style="width: 38%;"></span>
            <span class="skeleton skeleton-text" style="width: 25%;"></span>
          </div>
        </div>
      </div>

    </div>
  </section>

  <!-- Tabelle -->
  <section class="section">
    <p class="section-label">Tabelle (Ladezustand)</p>
    <div style="background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm);">

      <!-- Thead placeholder -->
      <div style="padding: var(--space-3) var(--space-5); border-bottom: 1px solid var(--color-border); background: var(--color-background); display: flex; gap: var(--space-6);">
        <span class="skeleton skeleton-text-sm" style="width: 120px;"></span>
        <span class="skeleton skeleton-text-sm" style="width: 90px;"></span>
        <span class="skeleton skeleton-text-sm" style="width: 60px;"></span>
        <span class="skeleton skeleton-text-sm" style="width: 80px; margin-left: auto;"></span>
        <span class="skeleton skeleton-text-sm" style="width: 70px;"></span>
        <span class="skeleton skeleton-text-sm" style="width: 55px;"></span>
      </div>

      <div class="skeleton-row">
        <span class="skeleton skeleton-text" style="width: 140px;"></span>
        <span class="skeleton skeleton-text" style="width: 110px;"></span>
        <span class="skeleton skeleton-text" style="width: 50px;"></span>
        <span class="skeleton skeleton-text" style="width: 80px; margin-left: auto;"></span>
        <span class="skeleton skeleton-text" style="width: 90px;"></span>
        <span class="skeleton skeleton-box" style="width: 70px; height: 20px;"></span>
      </div>
      <div class="skeleton-row">
        <span class="skeleton skeleton-text" style="width: 125px;"></span>
        <span class="skeleton skeleton-text" style="width: 95px;"></span>
        <span class="skeleton skeleton-text" style="width: 55px;"></span>
        <span class="skeleton skeleton-text" style="width: 85px; margin-left: auto;"></span>
        <span class="skeleton skeleton-text" style="width: 80px;"></span>
        <span class="skeleton skeleton-box" style="width: 65px; height: 20px;"></span>
      </div>
      <div class="skeleton-row">
        <span class="skeleton skeleton-text" style="width: 150px;"></span>
        <span class="skeleton skeleton-text" style="width: 100px;"></span>
        <span class="skeleton skeleton-text" style="width: 60px;"></span>
        <span class="skeleton skeleton-text" style="width: 90px; margin-left: auto;"></span>
        <span class="skeleton skeleton-text" style="width: 75px;"></span>
        <span class="skeleton skeleton-box" style="width: 55px; height: 20px;"></span>
      </div>
      <div class="skeleton-row">
        <span class="skeleton skeleton-text" style="width: 130px;"></span>
        <span class="skeleton skeleton-text" style="width: 105px;"></span>
        <span class="skeleton skeleton-text" style="width: 48px;"></span>
        <span class="skeleton skeleton-text" style="width: 88px; margin-left: auto;"></span>
        <span class="skeleton skeleton-text" style="width: 82px;"></span>
        <span class="skeleton skeleton-box" style="width: 60px; height: 20px;"></span>
      </div>
      <div class="skeleton-row" style="border-bottom: none;">
        <span class="skeleton skeleton-text" style="width: 118px;"></span>
        <span class="skeleton skeleton-text" style="width: 98px;"></span>
        <span class="skeleton skeleton-text" style="width: 52px;"></span>
        <span class="skeleton skeleton-text" style="width: 78px; margin-left: auto;"></span>
        <span class="skeleton skeleton-text" style="width: 86px;"></span>
        <span class="skeleton skeleton-box" style="width: 68px; height: 20px;"></span>
      </div>

    </div>
  </section>

  <!-- Aktivitäts-Feed -->
  <section class="section">
    <p class="section-label">Aktivitäts-Feed (Ladezustand)</p>
    <div style="display: flex; flex-direction: column; gap: var(--space-4); max-width: 400px;">

      <div class="skeleton-list-item">
        <span class="skeleton skeleton-circle" style="width: 28px; height: 28px;"></span>
        <div style="flex: 1; display: flex; flex-direction: column; gap: var(--space-2);">
          <span class="skeleton skeleton-text" style="width: 85%;"></span>
          <span class="skeleton skeleton-text-sm" style="width: 40%;"></span>
        </div>
      </div>
      <div class="skeleton-list-item">
        <span class="skeleton skeleton-circle" style="width: 28px; height: 28px;"></span>
        <div style="flex: 1; display: flex; flex-direction: column; gap: var(--space-2);">
          <span class="skeleton skeleton-text" style="width: 70%;"></span>
          <span class="skeleton skeleton-text-sm" style="width: 35%;"></span>
        </div>
      </div>
      <div class="skeleton-list-item">
        <span class="skeleton skeleton-circle" style="width: 28px; height: 28px;"></span>
        <div style="flex: 1; display: flex; flex-direction: column; gap: var(--space-2);">
          <span class="skeleton skeleton-text" style="width: 90%;"></span>
          <span class="skeleton skeleton-text-sm" style="width: 45%;"></span>
        </div>
      </div>

    </div>
  </section>

</body>
</html>
